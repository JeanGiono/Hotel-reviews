<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日陽明山之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .card { transition: transform 0.2s; }
        .card:active { transform: scale(0.98); }
        .checkbox-done:checked + div { opacity: 0.5; text-decoration: line-through; }
    </style>
</head>
<body class="pb-10">

    <div class="bg-emerald-600 text-white p-6 rounded-b-3xl shadow-lg mb-6">
        <h1 class="text-2xl font-bold">陽明山竹子湖之旅</h1>
        <p class="text-emerald-100 mt-1"><i class="fa-regular fa-calendar-days mr-2"></i>明日行程表</p>
    </div>

    <div class="max-w-md mx-auto px-4 space-y-4">
        
        <label class="block">
            <input type="checkbox" class="hidden checkbox-done">
            <div class="card bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-start gap-4">
                <div class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold text-sm mt-1">08:30</div>
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800 text-lg">7-11 至善天下門市</h3>
                    <p class="text-slate-500 text-sm mb-3">第一集合地點</p>
                    <a href="https://www.google.com/maps/search/?api=1&query=7-ELEVEN+至善天下門市" class="inline-flex items-center text-blue-600 text-sm font-semibold">
                        <i class="fa-solid fa-location-dot mr-1"></i> 開啟地圖導航
                    </a>
                </div>
            </div>
        </label>

        <label class="block">
            <input type="checkbox" class="hidden checkbox-done">
            <div class="card bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-start gap-4">
                <div class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold text-sm mt-1">09:15</div>
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800 text-lg">陽明山前山公園</h3>
                    <p class="text-slate-500 text-sm mb-3">漫步園區、感受芬多精</p>
                    <a href="https://www.google.com/maps/search/?api=1&query=陽明山前山公園" class="inline-flex items-center text-blue-600 text-sm font-semibold">
                        <i class="fa-solid fa-location-dot mr-1"></i> 開啟地圖導航
                    </a>
                </div>
            </div>
        </label>

        <label class="block">
            <input type="checkbox" class="hidden checkbox-done">
            <div class="card bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-start gap-4">
                <div class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold text-sm mt-1">09:50</div>
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800 text-lg">陽明山中山樓</h3>
                    <p class="text-slate-500 text-sm mb-3">參觀歷史建築</p>
                    <a href="https://www.google.com/maps/search/?api=1&query=陽明山中山樓" class="inline-flex items-center text-blue-600 text-sm font-semibold">
                        <i class="fa-solid fa-location-dot mr-1"></i> 開啟地圖導航
                    </a>
                </div>
            </div>
        </label>

        <label class="block">
            <input type="checkbox" class="hidden checkbox-done">
            <div class="card bg-white p-4 rounded-2xl shadow-sm border border-emerald-200 flex items-start gap-4 ring-2 ring-emerald-50">
                <div class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full font-bold text-sm mt-1">11:30</div>
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800 text-lg">竹子湖海芋大道 & 午餐</h3>
                    <p class="text-slate-500 text-sm mb-1">用餐地點：<strong>青菜園</strong></p>
                    <p class="text-xs text-orange-600 mb-3"><i class="fa-solid fa-utensils mr-1"></i> 推薦：白斬雞、野菜料理</p>
                    <div class="flex gap-4">
                        <a href="https://www.google.com/maps/search/?api=1&query=竹子湖海芋大道" class="text-blue-600 text-sm font-semibold">海芋大道</a>
                        <a href="https://www.google.com/maps/search/?api=1&query=青菜園" class="text-blue-600 text-sm font-semibold">青菜園</a>
                    </div>
                </div>
            </div>
        </label>

        <label class="block">
            <input type="checkbox" class="hidden checkbox-done">
            <div class="card bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-start gap-4">
                <div class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full font-bold text-sm mt-1">14:30</div>
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800 text-lg">麗之湯溫泉會館</h3>
                    <p class="text-slate-500 text-sm mb-3">北投溫泉泡湯放鬆</p>
                    <a href="https://www.google.com/maps/search/?api=1&query=北投麗之湯溫泉會館" class="inline-flex items-center text-blue-600 text-sm font-semibold">
                        <i class="fa-solid fa-location-dot mr-1"></i> 開啟地圖導航
                    </a>
                </div>
            </div>
        </label>

        <div class="bg-amber-50 border border-amber-200 p-4 rounded-2xl mt-6 text-sm text-amber-800">
            <p class="font-bold mb-1"><i class="fa-solid fa-circle-info mr-2"></i>溫馨提醒</p>
            <ul class="list-disc list-inside space-y-1">
                <li>山上溫差大，記得帶件薄外套。</li>
                <li>週末陽明山有交通管制，留意仰德大道通行規則。</li>
                <li>青菜園建議提早前往，避開中午尖峰時段。</li>
            </ul>
        </div>
    </div>

</body>
</html>
